name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  dashboard-plugin:
    name: dashboard-plugin (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.2']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: defyn_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: packages/dashboard-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: packages/dashboard-plugin/vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('packages/dashboard-plugin/composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            mysqladmin ping -h 127.0.0.1 -uroot --silent && exit 0
            sleep 1
          done
          echo "MySQL did not become ready in 60s" >&2
          exit 1

      - name: Set up wp-tests-config.php
        run: |
          cat > wp-tests-config.php <<'PHPEOF'
          <?php
          define('ABSPATH', __DIR__ . '/vendor/wordpress/');
          define('WP_TESTS_DOMAIN', 'defyn.test');
          define('WP_TESTS_EMAIL', 'admin@defyn.test');
          define('WP_TESTS_TITLE', 'DefynWP Tests');
          define('WP_PHP_BINARY', 'php');

          define('DB_NAME', 'defyn_test');
          define('DB_USER', 'root');
          define('DB_PASSWORD', '');
          define('DB_HOST', '127.0.0.1');
          define('DB_CHARSET', 'utf8mb4');
          define('DB_COLLATE', '');

          $table_prefix = 'wptests_';
          PHPEOF

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit
